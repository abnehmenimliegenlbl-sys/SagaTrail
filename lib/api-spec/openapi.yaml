openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: SagaTrail Online-Katalog (Kantone, Routen, Sagen)
  - name: stories
    description: KI-generierte Sagen-Erzaehlungen (Anthropic, in Postgres gecacht)
  - name: routes
    description: Dynamische Routen aus OpenStreetMap/swisstopo und ihre KI-Sagen
  - name: profile
    description: Nutzerkonto (Clerk-authentifiziert) - Profil und Premium-Status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /catalog:
    get:
      operationId: getCatalog
      tags: [catalog]
      summary: Vollstaendiger Online-Katalog
      description: Liefert alle Kantone, Wanderrouten und Sagen-Metadaten fuer den Katalog.
      responses:
        "200":
          description: Katalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogResponse"
  /stories:
    post:
      operationId: createStory
      tags: [stories]
      summary: Sagen-Erzaehlung erzeugen oder aus dem Cache liefern
      description: >
        Liefert die kapitelweise Erzaehlung fuer eine Sage, abgestimmt auf
        Archetyp, Alterstufe und Sprache. Bereits erzeugte Erzaehlungen kommen
        aus dem Postgres-Cache, sonst werden sie via Anthropic generiert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryRequest"
      responses:
        "200":
          description: Erzaehlung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Ungueltige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Sage nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: KI-Erzeugung fehlgeschlagen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cantons/{canton}/routes:
    get:
      operationId: getCantonRoutes
      tags: [routes]
      summary: Reale Wanderrouten eines Kantons
      description: >
        Laedt reale Wanderrouten des Kantons aus OpenStreetMap, angereichert mit
        amtlichen swisstopo-Hoehenmetern. Ergebnisse werden serverseitig gecacht.
        Optionale Filter (Distanz, Hoehenmeter, SAC-Schwierigkeit) grenzen die
        Suche direkt an der Datenquelle ein. Werden Schwierigkeitsgrenzen gesetzt,
        entfallen Routen mit unbekanntem SAC-Grad.
      parameters:
        - name: canton
          in: path
          required: true
          schema:
            type: string
        - name: distMin
          in: query
          required: false
          description: Minimale Distanz in Kilometern.
          schema:
            type: number
            minimum: 0
        - name: distMax
          in: query
          required: false
          description: Maximale Distanz in Kilometern (weglassen = keine Obergrenze).
          schema:
            type: number
            minimum: 0
        - name: ascMin
          in: query
          required: false
          description: Minimale Hoehenmeter im Aufstieg.
          schema:
            type: number
            minimum: 0
        - name: ascMax
          in: query
          required: false
          description: Maximale Hoehenmeter im Aufstieg (weglassen = keine Obergrenze).
          schema:
            type: number
            minimum: 0
        - name: diffMin
          in: query
          required: false
          description: Minimaler SAC-Grad (1 = T1). Nur Routen mit bekanntem Grad.
          schema:
            type: integer
            minimum: 1
            maximum: 6
        - name: diffMax
          in: query
          required: false
          description: Maximaler SAC-Grad (6 = T6). Nur Routen mit bekanntem Grad.
          schema:
            type: integer
            minimum: 1
            maximum: 6
        - name: ganzjaehrigNur
          in: query
          required: false
          description: >
            Wenn true, nur Routen mit ganzjaehriger Begehbarkeit (tiefe Lage,
            einfacher Schwierigkeitsgrad) liefern.
          schema:
            type: boolean
      responses:
        "200":
          description: Routen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogRoute"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/aerialways:
    get:
      operationId: getAerialways
      tags: [routes]
      summary: Seilbahnen und Standseilbahnen in einem Kartenausschnitt
      description: >
        Liefert Luftseilbahnen, Gondelbahnen, Sessellifte und Standseilbahnen
        (typische alpine Wander-Verkehrsmittel) aus OpenStreetMap innerhalb
        einer Bounding Box, zur Darstellung auf der Wanderkarte.
      parameters:
        - name: south
          in: query
          required: true
          schema:
            type: number
        - name: west
          in: query
          required: true
          schema:
            type: number
        - name: north
          in: query
          required: true
          schema:
            type: number
        - name: east
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Seilbahnen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Aerialway"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/pois:
    get:
      operationId: getPois
      tags: [routes]
      summary: Points of Interest mit Wikipedia-Anreicherung in einem Kartenausschnitt
      description: >
        Liefert historische und touristische Orte (OpenStreetMap
        historic=*/tourism=attraction|viewpoint) innerhalb einer Bounding Box.
        Orte mit einer verknuepften Wikipedia-/Wikidata-Referenz werden live
        mit einer kurzen Zusammenfassung angereichert (CC BY-SA, mit
        Quellenangabe).
      parameters:
        - name: south
          in: query
          required: true
          schema:
            type: number
        - name: west
          in: query
          required: true
          schema:
            type: number
        - name: north
          in: query
          required: true
          schema:
            type: number
        - name: east
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Points of Interest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Poi"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/partners:
    get:
      operationId: getPartners
      tags: [routes]
      summary: Aktive Partnerbetriebe (Restaurants, Souvenirlaeden, ...) in einem Kartenausschnitt
      description: >
        Liefert aktive, ueber die Admin-Oberflaeche gepflegte Partnerbetriebe
        innerhalb einer Bounding Box.
      parameters:
        - name: south
          in: query
          required: true
          schema:
            type: number
        - name: west
          in: query
          required: true
          schema:
            type: number
        - name: north
          in: query
          required: true
          schema:
            type: number
        - name: east
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Partnerbetriebe
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"
  /routes/poi-story:
    get:
      operationId: getPoiStory
      tags: [routes]
      summary: Kontexttext eines Point of Interest in Sagen-Erzaehlton erzeugen
      description: >
        Formt den rohen Wikipedia-Auszug eines Point of Interest (Name +
        Extract) per KI in einen kurzen, atmosphaerischen Text im
        Erzaehlstil der App-Sagen um -- Du-Anrede, Praesens, kein
        Gendern. Fehlt der Wikipedia-Auszug, entsteht stattdessen ein
        kurzer, zurueckhaltender Kontext aus Name und OSM-Kategorie
        (kind), ohne erfundene Fakten. Ergebnisse werden serverseitig
        nach Titel/Extract/Sprache gecacht, da der Ausgangstext stabil ist.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: extract
          in: query
          required: false
          schema:
            type: string
        - name: kind
          in: query
          required: false
          schema:
            type: string
        - name: lang
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sagen-stilisierter Erzaehltext
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoiStory"
        "400":
          description: Ungueltige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: KI-Umschreibung fehlgeschlagen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/weather:
    get:
      operationId: getWeather
      tags: [routes]
      summary: Live-Wetter und daraus abgeleiteter Wegzustand fuer einen Punkt
      description: >
        Liefert aktuelle Wetterdaten (Open-Meteo, ohne API-Key) fuer den
        Ausgangspunkt einer Route sowie einen daraus abgeleiteten
        Wegzustand-Hinweis (kein offizieller Sperr-/Lawinenstatus, sondern eine
        Einschaetzung aus Niederschlag, Schneehoehe, Temperatur und Boeen).
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Wetter und Wegzustand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherReport"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/surfaces:
    get:
      operationId: getRouteSurfaces
      tags: [routes]
      summary: Wegoberflächen einer Route (OSM surface-Tags)
      description: >
        Liefert die Wegoberflächen-Wechselpunkte einer Route aus OpenStreetMap,
        abgeleitet aus den surface-Tags der Mitglieds-Ways der Relation.
        Jeder Eintrag markiert den Startpunkt eines Abschnitts mit neuer Oberfläche.
        Schlägt die Overpass-Abfrage fehl, wird ein leeres Array zurückgeliefert.
      parameters:
        - name: osmId
          in: query
          required: true
          schema:
            type: integer
            description: OSM-Relation-ID der Route
      responses:
        "200":
          description: Oberflächenwechselpunkte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteSurfacesResponse"
        "400":
          description: Ungueltige osmId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Overpass nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/photo:
    get:
      operationId: getRoutePhoto
      tags: [routes]
      summary: Repraesentatives Foto fuer eine Route (Wikimedia Commons)
      description: >
        Sucht ein echtes Foto in der Naehe des Routenstartpunkts ueber die
        Wikimedia-Commons-Geosuche. Liefert null, wenn kein passendes Foto
        gefunden wird — der Client zeigt dann sein eigenes Fallback-Bild.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Foto-URL oder null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutePhoto"
        "400":
          description: Ungueltige Koordinaten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sagas/photo:
    get:
      operationId: getSagaPhoto
      tags: [routes]
      summary: Thematisch passendes Foto fuer eine Sage (Wikimedia Commons)
      description: >
        Sucht ein echtes Foto ueber die Wikimedia-Commons-Volltextsuche nach
        dem Kernmotiv der Sage (z. B. "Vogel Gryff", "Baer"), statt nach dem
        Ort der Handlung. Liefert null, wenn kein passendes Foto gefunden
        wird — der Client zeigt dann sein eigenes Fallback-Bild.
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Foto-URL oder null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutePhoto"
        "400":
          description: Ungueltige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/geocode:
    get:
      operationId: searchPlaces
      tags: [routes]
      summary: Orts-/Adresssuche in der Schweiz fuer die Eigene-Route-Eingabe
      description: >
        Liefert bis zu sechs Orts-/Adressvorschlaege in der Schweiz
        (OpenStreetMap Nominatim, ohne API-Key) fuer eine Sucheingabe. Dient
        als Vorschlagsliste bei der Eingabe von Start und Ziel einer eigenen
        Route.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Ortsvorschlaege
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeocodePlace"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/custom:
    get:
      operationId: getCustomRoute
      tags: [routes]
      summary: Berechnet eine Wanderroute zwischen zwei selbst gewaehlten Punkten
      description: >
        Berechnet eine Fussweg-Route zwischen Start- und Zielpunkt (OSRM,
        ohne API-Key) und reichert sie mit swisstopo-Hoehenmetern, SAC-Grad
        und Saison-Heuristik an (dieselbe Anreicherung wie bei Kantonsrouten).
        Die Route wird nicht persistiert, sondern bei jeder Anfrage neu
        berechnet.
      parameters:
        - name: startLat
          in: query
          required: true
          schema:
            type: number
        - name: startLng
          in: query
          required: true
          schema:
            type: number
        - name: endLat
          in: query
          required: true
          schema:
            type: number
        - name: endLng
          in: query
          required: true
          schema:
            type: number
        - name: startLabel
          in: query
          required: false
          schema:
            type: string
        - name: endLabel
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Berechnete Route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRoute"
        "400":
          description: Keine Route zwischen den Punkten gefunden oder Distanz ausserhalb des sinnvollen Bereichs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/gpx:
    post:
      operationId: importGpxRoute
      tags: [routes]
      summary: Importiert eine GPX-Datei als Wanderroute
      description: >
        Liest den Track aus einer GPX-Datei (trkpt, ersatzweise rtept),
        prueft, ob er in der Schweiz liegt, und reichert ihn mit denselben
        Quellen wie eigene Routen an (swisstopo-Hoehenmeter, SAC-Grad,
        Saison-Heuristik, Ortsnamen). Die Route wird nicht persistiert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpxImportBody"
      responses:
        "200":
          description: Importierte und angereicherte Route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRoute"
        "400":
          description: Ungueltige GPX-Datei, Track ausserhalb der Schweiz oder Distanz ausserhalb des sinnvollen Bereichs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/{routeId}/saga:
    get:
      operationId: getRouteSaga
      tags: [routes]
      summary: Naechstgelegene kuratierte Sage zu einer Route
      description: >
        Liefert die naechstgelegene kuratierte, gemeinfrei belegte Sage zur Route
        (kantonsweise Naehe). Es wird nichts erzeugt; ausschliesslich kuratierte
        Katalogdaten werden gelesen.
      parameters:
        - name: routeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSaga"
        "404":
          description: Route nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Sage konnte nicht ermittelt werden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me:
    get:
      operationId: getMyProfile
      tags: [profile]
      summary: Eigenes Profil laden
      description: >
        Liefert das Profil des authentifizierten Nutzers. 404, wenn nach dem
        Onboarding noch kein Profil angelegt wurde.
      responses:
        "200":
          description: Profil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kein Profil vorhanden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: saveMyProfile
      tags: [profile]
      summary: Eigenes Profil anlegen oder aktualisieren
      description: Legt das Profil des authentifizierten Nutzers an (Onboarding) oder aktualisiert es.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Gespeichertes Profil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Ungueltige Eingabe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/premium:
    patch:
      operationId: updateMyPremium
      tags: [profile]
      summary: Premium-Status setzen
      description: Aktiviert oder deaktiviert Premium fuer den authentifizierten Nutzer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PremiumUpdate"
      responses:
        "200":
          description: Aktualisiertes Profil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kein Profil vorhanden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/premium/sync:
    post:
      operationId: syncMyPremium
      tags: [profile]
      summary: Premium-Status verifiziert mit RevenueCat abgleichen
      description: >-
        Prueft serverseitig bei RevenueCat, ob der authentifizierte Nutzer
        (Customer-ID = Nutzer-ID) ein aktives "premium"-Entitlement besitzt,
        und setzt das Premium-Flag entsprechend. Nur Upgrades werden
        uebernommen; ein fehlendes Entitlement fuehrt NICHT zum Entzug
        (Downgrade bleibt Self-Service ueber PATCH /me/premium).
      responses:
        "200":
          description: Aktualisiertes Profil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kein Profil vorhanden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: RevenueCat nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/progress/sync:
    post:
      operationId: syncMyProgress
      tags: [profile]
      summary: Wanderverlauf und Errungenschaften mit dem Server abgleichen
      description: >-
        Gleicht den lokal auf dem Geraet gefuehrten Wanderverlauf
        (hikeHistory) und die Errungenschaften (achievements) mit dem
        serverseitig gespeicherten Stand des authentifizierten Nutzers ab.
        Die Vereinigung beider Mengen (per id) wird serverseitig persistiert
        und zurueckgegeben, sodass ein An-/Abmelden oder ein Geraetewechsel
        keine bereits abgeschlossenen Wanderungen verliert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressSyncInput"
      responses:
        "200":
          description: Zusammengefuehrter Fortschritt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSyncResponse"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kein Profil vorhanden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/packs/claim:
    post:
      operationId: claimKantonspack
      tags: [profile]
      summary: Kantonspack-Kauf einem Kanton zuordnen
      description: >-
        Ordnet einen bezahlten Kantonspack-Kauf (Einzelprodukt
        "sagatrail_kantonspack") dem gewaehlten Kanton zu. Der Server prueft
        bei RevenueCat, dass der Customer mehr gueltige Kantonspack-Kaeufe
        als bereits vergebene pack_<kanton>-Entitlements hat, und vergibt
        dann das Entitlement des Kantons per Grant. Idempotent, falls der
        Kanton bereits freigeschaltet ist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimKantonspackBody"
      responses:
        "200":
          description: Ergebnis der Zuordnung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimKantonspackResponse"
        "400":
          description: Unbekannter Kanton
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Kein offener Kantonspack-Kauf vorhanden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: RevenueCat nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/free-hike:
    patch:
      operationId: consumeMyFreeHike
      tags: [profile]
      summary: Kostenlose Wanderung verbrauchen
      description: >-
        Markiert die einmalige kostenlose Wanderung des authentifizierten
        Nutzers als verbraucht. Wird beim Start der ersten Wanderung
        aufgerufen (nicht-Premium-Nutzer).
      responses:
        "200":
          description: Aktualisiertes Profil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Kein Profil vorhanden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /narration:
    post:
      operationId: createNarration
      tags: [narration]
      summary: Kapitel-Erzaehlung als KI-Audio synthetisieren
      description: >-
        Synthetisiert den uebergebenen Erzaehltext als natuerlich klingende
        Audio-Erzaehlung via ElevenLabs (Premium-Feature, online-only, kein
        Offline-Fallback). Fuer Schweizerdeutsch (gsw) muss bereits der
        Hochdeutsch-Text uebergeben werden -- die Schweizer Faerbung kommt
        ausschliesslich ueber die Stimme, nie ueber Dialekt-Text. Ergebnisse
        werden serverseitig nach Textinhalt gecacht. Nur fuer Premium-Nutzer:
        die kostenlose erste Wanderung nutzt die on-device Stimme und ruft
        diesen Endpunkt nie auf.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrationInput"
      responses:
        "200":
          description: MP3-Audiodaten der Erzaehlung
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Ungueltige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Nicht authentifiziert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Premium erforderlich
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Sprachsynthese fehlgeschlagen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    GpxImportBody:
      type: object
      properties:
        gpx:
          type: string
          description: Kompletter Inhalt der GPX-Datei (XML als Text)
          minLength: 1
        name:
          type: string
          description: Optionaler Anzeigename (z. B. Dateiname ohne Endung)
      required:
        - gpx
    ClaimKantonspackBody:
      type: object
      properties:
        kanton:
          type: string
          description: Kanton-Slug (z. B. "zuerich", wie kantonSlug(name))
      required:
        - kanton
    ClaimKantonspackResponse:
      type: object
      properties:
        entitlement:
          type: string
          description: Vergebenes Entitlement (pack_<kanton>)
        bereitsFreigeschaltet:
          type: boolean
          description: True, wenn der Kanton schon vorher freigeschaltet war
      required:
        - entitlement
        - bereitsFreigeschaltet
    Profile:
      type: object
      properties:
        id:
          type: string
          description: Clerk-Benutzer-ID
        name:
          type: string
        archetype:
          type: string
          enum: [reisende, hueterin, gewitzte, senn]
        homeCanton:
          type: string
        language:
          type: string
        ageTier:
          type: string
          enum: [kinder, jugendliche, erwachsene]
        premium:
          type: boolean
        freeHikeUsed:
          type: boolean
          description: >-
            Ob die einmalige kostenlose Wanderung bereits verbraucht wurde.
            Solange false, ist genau eine Wanderung (egal welcher Kanton)
            auch ohne Premium freigeschaltet.
      required:
        - id
        - name
        - archetype
        - homeCanton
        - language
        - ageTier
        - premium
        - freeHikeUsed
    ProfileInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        archetype:
          type: string
          enum: [reisende, hueterin, gewitzte, senn]
        homeCanton:
          type: string
          minLength: 1
        language:
          type: string
          minLength: 2
        ageTier:
          type: string
          enum: [kinder, jugendliche, erwachsene]
      required:
        - name
        - archetype
        - homeCanton
        - language
        - ageTier
    PremiumUpdate:
      type: object
      properties:
        premium:
          type: boolean
      required:
        - premium
    HikeSession:
      type: object
      description: >-
        Ein abgeschlossenes Wander-Erlebnis. Die genaue Feldstruktur wird
        clientseitig verwaltet (Kapitel, Geometrie, Fotos etc.); der Server
        speichert und merged Eintraege nur ueber ihre id, ohne den Inhalt zu
        interpretieren.
      properties:
        id:
          type: string
      required:
        - id
      additionalProperties: true
    Achievement:
      type: object
      properties:
        id:
          type: string
          description: Sagen-ID
        sagaTitle:
          type: string
        unlockedAt:
          type: number
          description: Unix-Timestamp (ms)
      required:
        - id
        - sagaTitle
        - unlockedAt
      additionalProperties: true
    ProgressSyncInput:
      type: object
      properties:
        hikeHistory:
          type: array
          items:
            $ref: "#/components/schemas/HikeSession"
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
      required:
        - hikeHistory
        - achievements
    ProgressSyncResponse:
      type: object
      properties:
        hikeHistory:
          type: array
          items:
            $ref: "#/components/schemas/HikeSession"
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
      required:
        - hikeHistory
        - achievements
    NarrationInput:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        language:
          type: string
          description: >-
            Sprachcode der Erzaehlung (bestimmt die Stimmwahl, z. B. eine
            Schweizer Faerbung fuer "gsw"). Der uebergebene Text muss fuer
            "gsw" bereits Hochdeutsch sein — Dialekt-Text wird nie an die TTS
            geschickt.
      required:
        - text
    CatalogCoordinates:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
    CatalogCanton:
      type: object
      properties:
        canton:
          type: string
        routeCount:
          type: integer
      required:
        - canton
        - routeCount
    CatalogRoute:
      type: object
      properties:
        id:
          type: string
        sagaId:
          type: string
        name:
          type: string
        region:
          type: string
        distanceKm:
          type: number
        ascentM:
          type: number
        maxElevationM:
          type: number
          description: Hoechster Punkt der Route in Metern ue. M. (swisstopo-Hoehenprofil).
        season:
          type: string
          enum: [ganzjaehrig, eher_sommer, nur_sommer]
          description: >
            Grobe Saison-Einschaetzung aus maximaler Hoehe und SAC-Schwierigkeit
            (Heuristik, keine amtliche Aussage zum aktuellen Zustand).
        minutes:
          type: number
        sac:
          type: string
        terrain:
          type: string
        coordinates:
          $ref: "#/components/schemas/CatalogCoordinates"
        geometry:
          type: array
          description: Ausgeduennter Wegverlauf als [lat, lng]-Paare (nur bei realen OSM-Routen vorhanden).
          items:
            type: array
            items:
              type: number
        featured:
          type: boolean
      required:
        - id
        - sagaId
        - name
        - region
        - distanceKm
        - ascentM
        - maxElevationM
        - season
        - minutes
        - sac
        - terrain
        - coordinates
        - featured
    Aerialway:
      type: object
      description: >
        Seilbahn, Gondelbahn, Sessellift oder Standseilbahn aus OpenStreetMap.
      properties:
        id:
          type: string
        kind:
          type: string
          description: "cable_car | gondola | chair_lift | funicular"
        geometry:
          type: array
          items:
            type: array
            items:
              type: number
      required:
        - id
        - kind
        - geometry
    RoutePhoto:
      type: object
      description: >
        Repraesentatives Foto aus Wikimedia Commons nahe dem Routenstart.
        photoUrl ist null, wenn nichts Passendes gefunden wurde.
      properties:
        photoUrl:
          type: string
          nullable: true
        attribution:
          type: string
          nullable: true
      required:
        - photoUrl
        - attribution
    RouteSurfacePoint:
      type: object
      description: Startpunkt eines Wegabschnitts mit einer bestimmten Oberfläche
      properties:
        surface:
          type: string
          description: OSM-surface-Tag (z.B. asphalt, gravel, unpaved, rock)
        lat:
          type: number
        lng:
          type: number
      required: [surface, lat, lng]
    RouteSurfacesResponse:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/RouteSurfacePoint"
      required: [points]
    WeatherReport:
      type: object
      description: >
        Live-Wetterdaten (Open-Meteo) und ein daraus abgeleiteter
        Wegzustand-Hinweis. Kein offizieller Sperr-/Lawinenstatus.
      properties:
        temperatureC:
          type: number
        windKmh:
          type: number
        windGustsKmh:
          type: number
        precipitationMm:
          type: number
        snowDepthCm:
          type: number
        weatherCode:
          type: integer
          description: WMO-Wettercode von Open-Meteo
        conditionLabel:
          type: string
          description: Deutschsprachige Kurzbeschreibung des Wettercodes
        trailConditionLevel:
          type: string
          description: "gut | vorsicht | kritisch"
        trailConditionLabel:
          type: string
        trailConditionNote:
          type: string
        source:
          type: string
        fetchedAt:
          type: string
          format: date-time
      required:
        - temperatureC
        - windKmh
        - windGustsKmh
        - precipitationMm
        - snowDepthCm
        - weatherCode
        - conditionLabel
        - trailConditionLevel
        - trailConditionLabel
        - trailConditionNote
        - source
        - fetchedAt
    GeocodePlace:
      type: object
      description: Ein Orts-/Adressvorschlag (OpenStreetMap Nominatim).
      properties:
        label:
          type: string
        lat:
          type: number
        lng:
          type: number
      required:
        - label
        - lat
        - lng
    Poi:
      type: object
      description: >
        Historischer oder touristischer Ort aus OpenStreetMap, optional live mit
        einer Wikipedia-Zusammenfassung angereichert.
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          description: "OSM-Tag, z.B. historic=ruins oder tourism=attraction"
        lat:
          type: number
        lng:
          type: number
        wiki:
          $ref: "#/components/schemas/WikiSummary"
      required:
        - id
        - name
        - kind
        - lat
        - lng
    Partner:
      type: object
      description: >
        Aktiver Partnerbetrieb (Restaurant, Souvenirladen, ...) entlang einer
        Route, gepflegt ueber die interne Admin-Oberflaeche.
      properties:
        id:
          type: string
        name:
          type: string
        kategorie:
          type: string
          enum: [restaurant, cafe, souvenir, uebernachtung, sonstiges]
        canton:
          type: string
        beschreibung:
          type: string
          nullable: true
        angebot:
          type: string
          nullable: true
        lat:
          type: number
        lng:
          type: number
      required:
        - id
        - name
        - kategorie
        - canton
        - lat
        - lng
    WikiSummary:
      type: object
      description: Live von Wikipedia geladene Kurzzusammenfassung (CC BY-SA).
      properties:
        title:
          type: string
        extract:
          type: string
        url:
          type: string
        lang:
          type: string
        image:
          type: string
          nullable: true
          description: Vorschaubild-URL des Wikipedia-Artikels, sofern vorhanden.
      required:
        - title
        - extract
        - url
        - lang
    PoiStory:
      type: object
      description: Sagen-stilisierte Umschreibung eines Wikipedia-Auszugs.
      properties:
        text:
          type: string
      required:
        - text
    LocalizedSummary:
      type: object
      properties:
        text:
          type: string
        reviewEmpfohlen:
          type: boolean
      required:
        - text
        - reviewEmpfohlen
    SagaQuelle:
      type: object
      properties:
        autor:
          type: string
        werk:
          type: string
        jahr:
          type: string
        fundstelleUrl:
          type: string
      required:
        - autor
        - werk
        - jahr
        - fundstelleUrl
    CatalogSaga:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        canton:
          type: string
        coreMotif:
          type: string
        bildmotiv:
          type: string
          description: >
            Konkreter, fotografierbarer Suchbegriff fuer das Sagenbild (z. B.
            "Vogel Gryff Basel", "Braunbär"), unabhaengig vom Handlungsort.
        mood:
          type: string
        summary:
          type: string
        summaries:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LocalizedSummary"
        altersstufenHinweis:
          type: string
        quelle:
          $ref: "#/components/schemas/SagaQuelle"
        source:
          type: string
        coordinates:
          $ref: "#/components/schemas/CatalogCoordinates"
        koordinatenSicherheit:
          type: string
          enum:
            - exakt
            - ungefaehr
            - nicht_lokalisierbar
        isAnchorPlace:
          type: boolean
      required:
        - id
        - title
        - canton
        - coreMotif
        - mood
        - summary
        - summaries
        - source
        - koordinatenSicherheit
        - isAnchorPlace
    CatalogResponse:
      type: object
      properties:
        cantons:
          type: array
          items:
            $ref: "#/components/schemas/CatalogCanton"
        routes:
          type: array
          items:
            $ref: "#/components/schemas/CatalogRoute"
        sagas:
          type: array
          items:
            $ref: "#/components/schemas/CatalogSaga"
      required:
        - cantons
        - routes
        - sagas
    StoryDecisionOption:
      type: object
      properties:
        label:
          type: string
        archetypeHint:
          type: string
        tone:
          type: string
      required:
        - label
        - archetypeHint
        - tone
    StoryDecision:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/StoryDecisionOption"
      required:
        - question
        - options
    StoryChapter:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        isDecisionPoint:
          type: boolean
        decision:
          $ref: "#/components/schemas/StoryDecision"
      required:
        - id
        - text
        - isDecisionPoint
    StoryRequest:
      type: object
      properties:
        sagaId:
          type: string
        archetype:
          type: string
          enum: [reisende, hueterin, gewitzte, senn]
        ageTier:
          type: string
          enum: [kinder, jugendliche, erwachsene]
        language:
          type: string
      required:
        - sagaId
        - archetype
        - ageTier
        - language
    StoryResponse:
      type: object
      properties:
        sagaId:
          type: string
        archetype:
          type: string
        ageTier:
          type: string
        language:
          type: string
        source:
          type: string
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/StoryChapter"
      required:
        - sagaId
        - archetype
        - ageTier
        - language
        - source
        - chapters
