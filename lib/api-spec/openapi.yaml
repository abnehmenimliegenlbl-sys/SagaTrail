openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: SagaTrail Online-Katalog (Kantone, Routen, Sagen)
  - name: stories
    description: KI-generierte Sagen-Erzaehlungen (Anthropic, in Postgres gecacht)
  - name: routes
    description: Dynamische Routen aus OpenStreetMap/swisstopo und ihre KI-Sagen
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /catalog:
    get:
      operationId: getCatalog
      tags: [catalog]
      summary: Vollstaendiger Online-Katalog
      description: Liefert alle Kantone, Wanderrouten und Sagen-Metadaten fuer den Katalog.
      responses:
        "200":
          description: Katalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogResponse"
  /stories:
    post:
      operationId: createStory
      tags: [stories]
      summary: Sagen-Erzaehlung erzeugen oder aus dem Cache liefern
      description: >
        Liefert die kapitelweise Erzaehlung fuer eine Sage, abgestimmt auf
        Archetyp, Alterstufe und Sprache. Bereits erzeugte Erzaehlungen kommen
        aus dem Postgres-Cache, sonst werden sie via Anthropic generiert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryRequest"
      responses:
        "200":
          description: Erzaehlung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Ungueltige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Sage nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: KI-Erzeugung fehlgeschlagen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cantons/{canton}/routes:
    get:
      operationId: getCantonRoutes
      tags: [routes]
      summary: Reale Wanderrouten eines Kantons
      description: >
        Laedt reale Wanderrouten des Kantons aus OpenStreetMap, angereichert mit
        amtlichen swisstopo-Hoehenmetern. Ergebnisse werden serverseitig gecacht.
        Optionale Filter (Distanz, Hoehenmeter, SAC-Schwierigkeit) grenzen die
        Suche direkt an der Datenquelle ein. Werden Schwierigkeitsgrenzen gesetzt,
        entfallen Routen mit unbekanntem SAC-Grad.
      parameters:
        - name: canton
          in: path
          required: true
          schema:
            type: string
        - name: distMin
          in: query
          required: false
          description: Minimale Distanz in Kilometern.
          schema:
            type: number
            minimum: 0
        - name: distMax
          in: query
          required: false
          description: Maximale Distanz in Kilometern (weglassen = keine Obergrenze).
          schema:
            type: number
            minimum: 0
        - name: ascMin
          in: query
          required: false
          description: Minimale Hoehenmeter im Aufstieg.
          schema:
            type: number
            minimum: 0
        - name: ascMax
          in: query
          required: false
          description: Maximale Hoehenmeter im Aufstieg (weglassen = keine Obergrenze).
          schema:
            type: number
            minimum: 0
        - name: diffMin
          in: query
          required: false
          description: Minimaler SAC-Grad (1 = T1). Nur Routen mit bekanntem Grad.
          schema:
            type: integer
            minimum: 1
            maximum: 6
        - name: diffMax
          in: query
          required: false
          description: Maximaler SAC-Grad (6 = T6). Nur Routen mit bekanntem Grad.
          schema:
            type: integer
            minimum: 1
            maximum: 6
      responses:
        "200":
          description: Routen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogRoute"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/aerialways:
    get:
      operationId: getAerialways
      tags: [routes]
      summary: Seilbahnen und Standseilbahnen in einem Kartenausschnitt
      description: >
        Liefert Luftseilbahnen, Gondelbahnen, Sessellifte und Standseilbahnen
        (typische alpine Wander-Verkehrsmittel) aus OpenStreetMap innerhalb
        einer Bounding Box, zur Darstellung auf der Wanderkarte.
      parameters:
        - name: south
          in: query
          required: true
          schema:
            type: number
        - name: west
          in: query
          required: true
          schema:
            type: number
        - name: north
          in: query
          required: true
          schema:
            type: number
        - name: east
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Seilbahnen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Aerialway"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/pois:
    get:
      operationId: getPois
      tags: [routes]
      summary: Points of Interest mit Wikipedia-Anreicherung in einem Kartenausschnitt
      description: >
        Liefert historische und touristische Orte (OpenStreetMap
        historic=*/tourism=attraction|viewpoint) innerhalb einer Bounding Box.
        Orte mit einer verknuepften Wikipedia-/Wikidata-Referenz werden live
        mit einer kurzen Zusammenfassung angereichert (CC BY-SA, mit
        Quellenangabe).
      parameters:
        - name: south
          in: query
          required: true
          schema:
            type: number
        - name: west
          in: query
          required: true
          schema:
            type: number
        - name: north
          in: query
          required: true
          schema:
            type: number
        - name: east
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Points of Interest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Poi"
        "502":
          description: Externe Datenquelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /routes/{routeId}/saga:
    get:
      operationId: getRouteSaga
      tags: [routes]
      summary: Naechstgelegene kuratierte Sage zu einer Route
      description: >
        Liefert die naechstgelegene kuratierte, gemeinfrei belegte Sage zur Route
        (kantonsweise Naehe). Es wird nichts erzeugt; ausschliesslich kuratierte
        Katalogdaten werden gelesen.
      parameters:
        - name: routeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSaga"
        "404":
          description: Route nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Sage konnte nicht ermittelt werden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    CatalogCoordinates:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
    CatalogCanton:
      type: object
      properties:
        canton:
          type: string
        routeCount:
          type: integer
      required:
        - canton
        - routeCount
    CatalogRoute:
      type: object
      properties:
        id:
          type: string
        sagaId:
          type: string
        name:
          type: string
        region:
          type: string
        distanceKm:
          type: number
        ascentM:
          type: number
        minutes:
          type: number
        sac:
          type: string
        terrain:
          type: string
        coordinates:
          $ref: "#/components/schemas/CatalogCoordinates"
        geometry:
          type: array
          description: Ausgeduennter Wegverlauf als [lat, lng]-Paare (nur bei realen OSM-Routen vorhanden).
          items:
            type: array
            items:
              type: number
        featured:
          type: boolean
      required:
        - id
        - sagaId
        - name
        - region
        - distanceKm
        - ascentM
        - minutes
        - sac
        - terrain
        - coordinates
        - featured
    Aerialway:
      type: object
      description: >
        Seilbahn, Gondelbahn, Sessellift oder Standseilbahn aus OpenStreetMap.
      properties:
        id:
          type: string
        kind:
          type: string
          description: "cable_car | gondola | chair_lift | funicular"
        geometry:
          type: array
          items:
            type: array
            items:
              type: number
      required:
        - id
        - kind
        - geometry
    Poi:
      type: object
      description: >
        Historischer oder touristischer Ort aus OpenStreetMap, optional live mit
        einer Wikipedia-Zusammenfassung angereichert.
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          description: "OSM-Tag, z.B. historic=ruins oder tourism=attraction"
        lat:
          type: number
        lng:
          type: number
        wiki:
          $ref: "#/components/schemas/WikiSummary"
      required:
        - id
        - name
        - kind
        - lat
        - lng
    WikiSummary:
      type: object
      description: Live von Wikipedia geladene Kurzzusammenfassung (CC BY-SA).
      properties:
        title:
          type: string
        extract:
          type: string
        url:
          type: string
        lang:
          type: string
      required:
        - title
        - extract
        - url
        - lang
    LocalizedSummary:
      type: object
      properties:
        text:
          type: string
        reviewEmpfohlen:
          type: boolean
      required:
        - text
        - reviewEmpfohlen
    SagaQuelle:
      type: object
      properties:
        autor:
          type: string
        werk:
          type: string
        jahr:
          type: string
        fundstelleUrl:
          type: string
      required:
        - autor
        - werk
        - jahr
        - fundstelleUrl
    CatalogSaga:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        canton:
          type: string
        coreMotif:
          type: string
        mood:
          type: string
        summary:
          type: string
        summaries:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LocalizedSummary"
        altersstufenHinweis:
          type: string
        quelle:
          $ref: "#/components/schemas/SagaQuelle"
        source:
          type: string
        coordinates:
          $ref: "#/components/schemas/CatalogCoordinates"
        koordinatenSicherheit:
          type: string
          enum:
            - exakt
            - ungefaehr
            - nicht_lokalisierbar
        isAnchorPlace:
          type: boolean
      required:
        - id
        - title
        - canton
        - coreMotif
        - mood
        - summary
        - summaries
        - source
        - koordinatenSicherheit
        - isAnchorPlace
    CatalogResponse:
      type: object
      properties:
        cantons:
          type: array
          items:
            $ref: "#/components/schemas/CatalogCanton"
        routes:
          type: array
          items:
            $ref: "#/components/schemas/CatalogRoute"
        sagas:
          type: array
          items:
            $ref: "#/components/schemas/CatalogSaga"
      required:
        - cantons
        - routes
        - sagas
    StoryDecisionOption:
      type: object
      properties:
        label:
          type: string
        archetypeHint:
          type: string
        tone:
          type: string
      required:
        - label
        - archetypeHint
        - tone
    StoryDecision:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/StoryDecisionOption"
      required:
        - question
        - options
    StoryChapter:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        isDecisionPoint:
          type: boolean
        decision:
          $ref: "#/components/schemas/StoryDecision"
      required:
        - id
        - text
        - isDecisionPoint
    StoryRequest:
      type: object
      properties:
        sagaId:
          type: string
        archetype:
          type: string
          enum: [reisende, hueterin, gewitzte, senn]
        ageTier:
          type: string
          enum: [kinder, jugendliche, erwachsene]
        language:
          type: string
      required:
        - sagaId
        - archetype
        - ageTier
        - language
    StoryResponse:
      type: object
      properties:
        sagaId:
          type: string
        archetype:
          type: string
        ageTier:
          type: string
        language:
          type: string
        source:
          type: string
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/StoryChapter"
      required:
        - sagaId
        - archetype
        - ageTier
        - language
        - source
        - chapters
